name: Release on Version Change

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.detect_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tags
        run: git fetch --tags origin

      - name: Detect Version Change
        id: detect_version
        run: |
          current_version=$(grep 'versionName' app/build.gradle.kts | sed -e 's/.*"\(.*\)".*/\1/' | head -n 1)
          echo "Current version: $current_version"

          if git tag -l | grep -q "^$current_version$"; then
            echo "Version $current_version already tagged. No new release will be created."
          else
            echo "Version $current_version is new."
            echo "VERSION=$current_version" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.VERSION
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ needs.check.outputs.VERSION }}"
          notes=$(awk "/^## $VERSION/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon test

      - name: Inject signing config
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          echo "$SIGNING_KEYSTORE" | base64 -d > app/barberfish.keystore
          echo "signing.store.file=barberfish.keystore" >> local.properties
          echo "signing.store.password=${{ secrets.SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS }}" >> local.properties
          echo "signing.key.password=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties

      - name: Assemble release APK
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Generate manifest
        env:
          RELEASE_NOTES: ${{ steps.release_notes.outputs.NOTES }}
        run: ./gradlew --no-daemon generateManifest

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/barberfish.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.VERSION }}
          name: ${{ needs.check.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          files: |
            app/build/outputs/apk/release/barberfish.apk
            app/src/main/res/drawable/ic_extension.png
            app/manifest.json
