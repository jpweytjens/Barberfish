name: Release on Version Change

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.detect_version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get tags
        run: git fetch --tags origin

      - name: Detect Version Change
        id: detect_version
        run: |
          current_version=$(grep 'versionName' app/build.gradle.kts | sed -e 's/.*"\(.*\)".*/\1/' | head -n 1)
          echo "Current version: $current_version"

          if git tag -l | grep -q "^$current_version$"; then
            echo "Version $current_version already tagged. No new release will be created."
          else
            echo "Version $current_version is new."
            echo "::set-output name=VERSION::$current_version"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.VERSION
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ needs.check.outputs.VERSION }}"
          notes=$(awk "/^## $VERSION/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon test

      - name: Inject signing config
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          echo "$SIGNING_KEYSTORE" | base64 -d > app/barberfish.keystore
          echo "signing.store.file=barberfish.keystore" >> local.properties
          echo "signing.store.password=${{ secrets.SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS }}" >> local.properties
          echo "signing.key.password=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties

      - name: Assemble release APK
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Generate manifest
        env:
          RELEASE_NOTES: ${{ steps.release_notes.outputs.NOTES }}
        run: ./gradlew --no-daemon generateManifest

      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check.outputs.VERSION }}
          release_name: ${{ needs.check.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: false

      - name: Upload APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/build/outputs/apk/release/app-release.apk
          asset_name: barberfish.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload icon
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/src/main/res/drawable/ic_extension.png
          asset_name: ic_extension.png
          asset_content_type: image/png

      - name: Upload manifest
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/manifest.json
          asset_name: manifest.json
          asset_content_type: application/json
